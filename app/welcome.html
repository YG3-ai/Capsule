<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Capsule</title>
<link rel="stylesheet" href="ui/tokens.css" />
<style>
  body {
    min-height: 100vh; display: flex; flex-direction: column;
    background:
      radial-gradient(900px 500px at 12% -10%, rgba(212,160,74,0.10), transparent 60%),
      radial-gradient(700px 500px at 100% 0%, rgba(200,100,61,0.06), transparent 55%),
      var(--bg);
  }
  .wrap { flex: 1; max-width: 760px; width: 100%; margin: 0 auto; padding: 84px 28px 40px; }

  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
  .mark { width: 22px; height: 22px; border-radius: 7px;
    background: linear-gradient(135deg, var(--brand-hover), #E0973F 55%, #C8643D);
    box-shadow: 0 4px 18px rgba(224,151,63,0.35); }
  .brand .name { font-family: var(--font); font-weight: 700; font-size: 14px;
    letter-spacing: var(--track-label); text-transform: uppercase; color: var(--text-dim); }

  h1 { margin: 0; font-family: var(--font); font-weight: 900; font-size: 56px; line-height: 1.02;
    letter-spacing: var(--track-tight); color: var(--text); }
  h1 .dot { color: var(--brand); }
  .sub { color: var(--text-dim); margin: 14px 0 44px; font-size: 17px; max-width: 46ch; line-height: 1.5; }
  .sub b { color: var(--text); font-weight: 600; }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .card { text-align: left; display: flex; flex-direction: column; gap: 8px; font-family: var(--font-body); }
  .card .ic { font-size: 20px; line-height: 1; color: var(--brand); }
  .card b { font-family: var(--font); font-weight: 700; color: var(--text); font-size: 17px; }
  .card span { color: var(--text-dim); font-size: 13.5px; line-height: 1.55; }

  #recents { margin-top: 44px; }
  #recents h3 { margin: 0 0 4px; }
  .recent { padding: 11px 12px; border-top: 1px solid var(--border); cursor: pointer; color: var(--text);
    border-radius: var(--r-md); font-size: 14px; transition: background var(--fast) var(--ease); }
  .recent:hover { background: var(--surface-hover); }
  .recent small { color: var(--text-dim); margin-left: 10px; font-size: 12px; }

  footer { text-align: center; padding: 22px; color: var(--text-dim); font-size: 12.5px;
    border-top: 1px solid var(--border-subtle); }
  footer a { color: var(--brand); text-decoration: none; font-weight: 500; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="mark"></div>
      <div class="name">Capsule</div>
    </div>
    <h1>Build a game<span class="dot">.</span><br />Drag it into place.</h1>
    <div class="sub">A thin visual editor for <b>three.js</b> games that stay plain, readable text. Describe it to the AI, then drag objects exactly where they go.</div>
    <div class="cards">
      <button class="cap-card cap-card--interactive card" id="new">
        <span class="ic">＋</span>
        <b>New project</b>
        <span>Pick 2D or 3D, PC or mobile, name it — then describe the game to the AI box.</span>
      </button>
      <button class="cap-card cap-card--interactive card" id="browse">
        <span class="ic">▦</span>
        <b>Browse projects</b>
        <span>Your Capsule folder — every game you've made, in one place. Click to open.</span>
      </button>
      <button class="cap-card cap-card--interactive card" id="open">
        <span class="ic">⤵</span>
        <b>Import existing project</b>
        <span>Copy a capsule from anywhere into your Capsule folder, then open it.</span>
      </button>
    </div>
    <div id="recents"></div>
  </div>
  <footer>A <a href="https://www.yg3.ai" target="_blank" rel="noopener">YG3</a> product · free &amp; open source</footer>
<script>
  const host = window.capsuleHost || {};
  document.getElementById('new').onclick = () => host.newScreen && host.newScreen();
  document.getElementById('browse').onclick = () => host.browse && host.browse();
  document.getElementById('open').onclick = () => host.importProject && host.importProject();
  if (host.recents) host.recents().then((list) => {
    if (!list || !list.length) return;
    const el = document.getElementById('recents');
    el.innerHTML = '<h3 class="cap-eyebrow">Recent</h3>';
    for (const r of list) {
      const d = document.createElement('div');
      d.className = 'recent';
      d.innerHTML = r.name + '<small>' + r.path + '</small>';
      d.onclick = () => host.openPath(r.path);
      el.appendChild(d);
    }
  });
</script>
</body>
</html>
