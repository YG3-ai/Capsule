<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Capsule</title>
<style>
  html, body { margin: 0; height: 100%; background: #15151b; color: #cce;
    font: 14px ui-monospace, Menlo, Consolas, monospace; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 64px 24px; }
  h1 { margin: 0; font-size: 34px; color: #fff; letter-spacing: 1px; }
  .sub { color: #8aa; margin: 6px 0 36px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { text-align: left; background: #1c1c24; border: 1px solid #333; border-radius: 10px;
    padding: 18px; cursor: pointer; color: #cce; display: flex; flex-direction: column; gap: 6px; font: inherit; }
  .card:hover { border-color: #4fd6c2; background: #20202a; }
  .card b { color: #4fd6c2; font-size: 15px; }
  .card span { color: #9aa; font-size: 12px; line-height: 1.5; }
  #recents { margin-top: 36px; }
  #recents h3 { font-size: 11px; color: #8aa; text-transform: uppercase; letter-spacing: .06em; }
  .recent { padding: 8px 10px; border-top: 1px solid #2a2a34; cursor: pointer; color: #cce; }
  .recent:hover { background: #20202a; }
  .recent small { color: #667; margin-left: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Capsule</h1>
  <div class="sub">A thin visual editor for three.js games.</div>
  <div class="cards">
    <button class="card" id="new">
      <b>+ New project</b>
      <span>Scaffold a blank three.js capsule, then open the AI box and say "make a 3D fighter game."</span>
    </button>
    <button class="card" id="open">
      <b>⌖ Open project</b>
      <span>Open an existing capsule — its objects and scenes are detected automatically.</span>
    </button>
  </div>
  <div id="recents"></div>
</div>
<script>
  const host = window.capsuleHost || {};
  document.getElementById('new').onclick = () => host.newProject && host.newProject();
  document.getElementById('open').onclick = () => host.pickProject && host.pickProject();
  if (host.recents) host.recents().then((list) => {
    if (!list || !list.length) return;
    const el = document.getElementById('recents');
    el.innerHTML = '<h3>Recent</h3>';
    for (const r of list) {
      const d = document.createElement('div');
      d.className = 'recent';
      d.innerHTML = r.name + '<small>' + r.path + '</small>';
      d.onclick = () => host.openPath(r.path);
      el.appendChild(d);
    }
  });
</script>
</body>
</html>
