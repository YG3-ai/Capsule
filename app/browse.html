<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Capsule — Projects</title>
<link rel="stylesheet" href="ui/tokens.css" />
<style>
  body { min-height: 100vh; display: flex; flex-direction: column;
    background: radial-gradient(900px 500px at 12% -10%, rgba(212,160,74,0.08), transparent 60%), var(--bg); }
  .wrap { flex: 1; max-width: 980px; width: 100%; margin: 0 auto; padding: 56px 28px 40px; }
  .head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 8px; }
  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--text-dim); cursor: pointer;
    font-family: var(--font); font-size: 13px; margin-bottom: 18px; }
  .back:hover { color: var(--text); }
  h1 { margin: 0; font-family: var(--font); font-weight: 900; font-size: 34px; letter-spacing: var(--track-tight); }
  .root { color: var(--text-dim); font-size: 12.5px; margin: 6px 0 26px; font-family: var(--font); }
  .root a { color: var(--brand); text-decoration: none; cursor: pointer; }
  .actions { display: flex; gap: 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .proj { text-align: left; cursor: pointer; display: flex; flex-direction: column; gap: 10px; min-height: 110px; }
  .proj .nm { font-family: var(--font); font-weight: 700; font-size: 16px; color: var(--text); }
  .proj .pth { color: var(--text-faint); font-size: 11px; word-break: break-all; margin-top: auto;
    font-family: var(--font); }
  .pills { display: flex; gap: 6px; }
  .pill { font-family: var(--font); font-weight: 600; font-size: 10px; text-transform: uppercase;
    letter-spacing: var(--track-label); padding: 3px 8px; border-radius: var(--r-full, 999px); border-radius: 999px;
    color: var(--text-muted); background: var(--surface-hover); border: 1px solid var(--border); }
  .pill.brand { color: var(--brand); background: var(--brand-soft); border-color: var(--brand-border); }
  .new { align-items: center; justify-content: center; text-align: center; color: var(--text-dim);
    border-style: dashed; }
  .new .plus { font-size: 28px; color: var(--brand); line-height: 1; }
  .new .lbl { font-family: var(--font); font-weight: 700; color: var(--text); font-size: 15px; margin-top: 6px; }
  .empty { color: var(--text-dim); font-family: var(--font-body); padding: 40px 0; line-height: 1.6; }
  .recents { margin-top: 40px; }
  .recents h3 { margin: 0 0 10px; }
  .recent { padding: 10px 12px; border-top: 1px solid var(--border); cursor: pointer; color: var(--text);
    border-radius: var(--r-md); font-size: 14px; font-family: var(--font); transition: background var(--fast) var(--ease); }
  .recent:hover { background: var(--surface-hover); }
  .recent small { color: var(--text-faint); margin-left: 10px; font-size: 11px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="back" id="back">← Welcome</div>
    <div class="head">
      <div>
        <h1>Projects</h1>
        <div class="root">in <a id="reveal"></a></div>
      </div>
      <div class="actions">
        <button class="cap-btn" id="open">Import…</button>
        <button class="cap-btn cap-btn--primary" id="new">＋ New</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="recents" id="recents"></div>
  </div>
<script>
  const host = window.capsuleHost || {};
  const grid = document.getElementById('grid');

  document.getElementById('back').onclick = () => host.welcome && host.welcome();
  document.getElementById('new').onclick = () => host.newScreen && host.newScreen();
  document.getElementById('open').onclick = () => host.importProject && host.importProject();
  document.getElementById('reveal').onclick = () => host.revealProjects && host.revealProjects();

  function card(p) {
    const el = document.createElement('button');
    el.className = 'cap-card cap-card--interactive proj';
    el.onclick = () => host.openPath(p.path);
    el.innerHTML =
      '<div class="nm"></div>' +
      '<div class="pills"><span class="pill brand"></span><span class="pill"></span></div>' +
      '<div class="pth"></div>';
    el.querySelector('.nm').textContent = p.name;
    el.querySelector('.pill.brand').textContent = (p.kind || '3d').toUpperCase();
    el.querySelector('.pill:not(.brand)').textContent = p.platform === 'mobile' ? 'Mobile' : 'Desktop';
    el.querySelector('.pth').textContent = p.path;
    return el;
  }

  host.projects && host.projects().then(({ root, projects, recents }) => {
    document.getElementById('reveal').textContent = root;
    // "New" tile first
    const tile = document.createElement('button');
    tile.className = 'cap-card cap-card--interactive proj new';
    tile.innerHTML = '<div class="plus">＋</div><div class="lbl">New project</div><div style="font-size:12px">2D / 3D · PC / Mobile</div>';
    tile.onclick = () => host.newScreen && host.newScreen();
    grid.appendChild(tile);

    for (const p of projects) grid.appendChild(card(p));
    if (!projects.length) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.textContent = 'No capsules here yet. Click New project to scaffold one — it lands in this folder.';
      grid.after(e);
    }

    // recents that live outside the projects folder
    const outside = (recents || []).filter((r) => !projects.some((p) => p.path === r.path));
    if (outside.length) {
      const rc = document.getElementById('recents');
      rc.innerHTML = '<h3 class="cap-eyebrow">Recent (elsewhere)</h3>';
      for (const r of outside) {
        const d = document.createElement('div');
        d.className = 'recent';
        d.innerHTML = r.name + '<small>' + r.path + '</small>';
        d.onclick = () => host.openPath(r.path);
        rc.appendChild(d);
      }
    }
  });
</script>
</body>
</html>
