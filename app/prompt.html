<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="ui/tokens.css" />
<style>
  html, body { height: 100%; background: var(--surface-raised); display: flex; flex-direction: column; }
  #msg { padding: 16px 16px 8px; color: var(--text-muted); font-family: var(--font-body); font-size: 13.5px; line-height: 1.5; }
  #in { margin: 4px 16px 0; }
  #row { display: flex; gap: 8px; justify-content: flex-end; padding: 14px 16px; }
  .cap-btn { font-size: 13px; padding: 8px 14px; }
</style>
</head>
<body>
<div id="msg"></div>
<input id="in" class="cap-input" />
<div id="row"><button id="cancel" class="cap-btn cap-btn--ghost">Cancel</button><button id="ok" class="cap-btn cap-btn--primary">OK</button></div>
<script>
  const { ipcRenderer } = require('electron');
  const p = new URLSearchParams(location.search);
  document.getElementById('msg').textContent = p.get('msg') || '';
  const input = document.getElementById('in');
  input.value = p.get('value') || '';
  input.focus(); input.select();
  const done = (v) => ipcRenderer.send('prompt:done', v);
  document.getElementById('ok').onclick = () => done(input.value);
  document.getElementById('cancel').onclick = () => done(null);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') done(input.value);
    if (e.key === 'Escape') done(null);
  });
</script>
</body>
</html>
