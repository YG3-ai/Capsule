<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Capsule · AI</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
<link rel="stylesheet" href="ui/tokens.css" />
<style>
  html, body { margin: 0; height: 100%; background: var(--bg); }
  #bar { height: 32px; display: flex; align-items: center; gap: 9px; padding: 0 14px;
    font-family: var(--font); font-size: 10.5px; font-weight: 700; letter-spacing: var(--track-label);
    text-transform: uppercase; color: var(--text-dim); background: var(--surface-raised); border-bottom: 1px solid var(--border); }
  #bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 8px var(--brand-border); }
  #bar b { color: var(--brand); font-weight: 700; }
  #bar #cwd { color: var(--text-faint); letter-spacing: .04em; text-transform: none; }
  #term { height: calc(100vh - 33px); padding: 10px 12px; box-sizing: border-box; }
</style>
</head>
<body>
<div id="bar"><span class="dot"></span><b id="agent">agent</b><span id="cwd"></span></div>
<div id="term"></div>
<script>
  // nodeIntegration is on for this local window, so we require the libs directly —
  // no bundler, no server. The agent CLI runs in a real PTY and renders in xterm.
  const { Terminal } = require('@xterm/xterm');
  const { FitAddon } = require('@xterm/addon-fit');
  const pty = require('node-pty');

  const params = new URLSearchParams(location.search);
  const dir = params.get('dir') || process.env.HOME;
  const cmd = (params.get('cmd') || 'claude').trim();
  document.getElementById('agent').textContent = cmd.split(/\s+/)[0];
  document.getElementById('cwd').textContent = dir.replace(process.env.HOME, '~');

  const term = new Terminal({
    fontFamily: 'ui-monospace, Menlo, Consolas, monospace', fontSize: 13, cursorBlink: true,
    theme: { background: '#0A0A0E', foreground: '#e8e8ee', cursor: '#D4A04A',
      selectionBackground: 'rgba(212,160,74,0.20)' },
  });
  const fit = new FitAddon();
  term.loadAddon(fit);
  term.open(document.getElementById('term'));
  fit.fit();

  function start() {
    const shell = process.env.SHELL || '/bin/zsh';
    // Run the agent inside a login+interactive shell so it inherits the user's full
    // PATH / env / auth. A packaged GUI app launches with a minimal env, so spawning
    // `claude` directly fails (its `node` shebang / the binary aren't on PATH) and it
    // exits immediately. The login shell also leaves a usable prompt if the agent quits.
    const proc = pty.spawn(shell, ['-il'], {
      name: 'xterm-color', cols: term.cols, rows: term.rows, cwd: dir, env: process.env,
    });
    proc.onData((d) => term.write(d));
    term.onData((d) => proc.write(d));
    proc.onExit(({ exitCode }) => term.write(`\r\n\x1b[90m[shell exited (${exitCode}). ⌘R to restart.]\x1b[0m\r\n`));
    // Launch the agent once the shell has initialised the user's environment.
    setTimeout(() => proc.write(cmd + '\r'), 350);
    const onResize = () => { fit.fit(); try { proc.resize(term.cols, term.rows); } catch {} };
    window.addEventListener('resize', onResize);
    return proc;
  }
  start();
  term.focus();
</script>
</body>
</html>
