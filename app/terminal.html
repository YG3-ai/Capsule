<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Capsule · AI</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
<link rel="stylesheet" href="ui/tokens.css" />
<style>
  html, body { margin: 0; height: 100%; background: var(--bg); }
  #bar { height: 32px; display: flex; align-items: center; gap: 9px; padding: 0 14px;
    font-family: var(--font); font-size: 10.5px; font-weight: 700; letter-spacing: var(--track-label);
    text-transform: uppercase; color: var(--text-dim); background: var(--surface-raised); border-bottom: 1px solid var(--border); }
  #bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 8px var(--brand-border); }
  #bar b { color: var(--brand); font-weight: 700; }
  #bar #cwd { color: var(--text-faint); letter-spacing: .04em; text-transform: none; }
  #bar #hide { margin-left: auto; cursor: pointer; background: transparent; border: 0; color: var(--text-dim);
    font-size: 13px; line-height: 1; padding: 4px 6px; border-radius: 6px; }
  #bar #hide:hover { background: var(--surface-hover); color: var(--text); }
  #term { height: calc(100vh - 33px); padding: 10px 12px; box-sizing: border-box; }
</style>
</head>
<body>
<div id="bar"><span class="dot"></span><b id="agent">agent</b><span id="cwd"></span><button id="hide" title="Hide (⌘J)">✕</button></div>
<div id="term"></div>
<script>
  // Surface any startup error in the panel instead of leaving it blank (e.g. a
  // native module that won't load on this platform).
  window.onerror = (msg, src, line, col, err) => {
    const t = document.getElementById('term') || document.body;
    t.style.cssText = 'color:#ff9a9a;font:12px ui-monospace,Consolas,monospace;white-space:pre-wrap;padding:12px';
    t.textContent = 'AI box failed to start:\n' + ((err && err.stack) || msg) + '\n\n(' + src + ':' + line + ':' + col + ')';
  };
  // xterm renders the terminal here; the PTY itself runs in the MAIN process
  // (Electron won't let a renderer create the Node Worker that node-pty's Windows
  // ConPTY backend needs), and we stream it in/out over IPC.
  const { Terminal } = require('@xterm/xterm');
  const { FitAddon } = require('@xterm/addon-fit');
  const { ipcRenderer } = require('electron');
  document.getElementById('hide').onclick = () => ipcRenderer.invoke('capsule:toggleAI');

  const params = new URLSearchParams(location.search);
  const dir = params.get('dir') || process.env.HOME || process.env.USERPROFILE || '';
  const cmd = (params.get('cmd') || 'claude').trim();
  document.getElementById('agent').textContent = cmd.split(/\s+/)[0];
  const home = process.env.HOME || process.env.USERPROFILE || '';
  document.getElementById('cwd').textContent = home ? dir.replace(home, '~') : dir;

  const term = new Terminal({
    fontFamily: 'ui-monospace, Menlo, Consolas, monospace', fontSize: 13, cursorBlink: true,
    theme: { background: '#0A0A0E', foreground: '#e8e8ee', cursor: '#D4A04A',
      selectionBackground: 'rgba(212,160,74,0.20)' },
  });
  const fit = new FitAddon();
  term.loadAddon(fit);
  term.open(document.getElementById('term'));
  fit.fit();

  // Wire xterm <-> the main-process PTY.
  ipcRenderer.on('pty:data', (_e, d) => term.write(d));
  ipcRenderer.on('pty:exit', (_e, code) => term.write(`\r\n\x1b[90m[shell exited (${code}).]\x1b[0m\r\n`));
  term.onData((d) => ipcRenderer.send('pty:input', d));
  const onResize = () => { fit.fit(); ipcRenderer.send('pty:resize', { cols: term.cols, rows: term.rows }); };
  window.addEventListener('resize', onResize);
  ipcRenderer.invoke('pty:spawn', { dir, cmd, cols: term.cols, rows: term.rows })
    .catch((err) => term.write('\r\n\x1b[91mPTY failed to start: ' + ((err && err.message) || err) + '\x1b[0m\r\n'));
  term.focus();

  // Mosaic → "Reference in chat": type a reference prompt into the live agent (no
  // newline, so the user finishes the sentence). Focus the terminal so they can.
  ipcRenderer.on('capsule:inject', (_e, text) => { ipcRenderer.send('pty:input', text); term.focus(); });
</script>
</body>
</html>
