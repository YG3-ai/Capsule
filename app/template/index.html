<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Capsule game</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #15151b; }
  canvas { display: block; }
  #hud { position: fixed; top: 8px; left: 8px; font: 12px ui-monospace, Menlo, monospace;
    color: #cce; background: rgba(0,0,0,.35); padding: 6px 8px; border-radius: 4px; pointer-events: none; }
</style>
<script type="importmap">
{
  "imports": {
    "three":         "https://unpkg.com/three@0.171.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.171.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud">empty capsule — open the AI box (⌘J) and describe a game</div>

<script type="module">
// === IMPORTS ===
import * as THREE from 'three';

// === RENDERER & SCENE ===
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15151b);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(5, 4, 7);
camera.lookAt(0, 0.5, 0);

// === LIGHTS ===
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(8, 12, 6); sun.castShadow = true;
scene.add(sun);

// === CAPSULE HOOK (the editor runtime — keep this) ===========================
// Exposes the live scene so the Capsule editor + AI can see and place things.
// An object becomes editable just by carrying userData.capsuleId — registerEditable()
// / tag() set that, and scan() auto-detects anything tagged. See the project's
// CLAUDE.md and the Capsule GUIDE.md for the conventions.
const DEG = Math.PI / 180;
const GLTF = await import('three/addons/loaders/GLTFLoader.js');
const _loader = new GLTF.GLTFLoader();
function _apply(obj, o) {
  if (!o) return;
  if (o.position) obj.position.set(o.position[0], o.position[1], o.position[2]);
  if (o.rotation) obj.rotation.set(o.rotation[0]*DEG, o.rotation[1]*DEG, o.rotation[2]*DEG);
  if (o.scale)    obj.scale.set(o.scale[0], o.scale[1], o.scale[2]);
  if (o.visible !== undefined) obj.visible = o.visible;
}
const _inScene = (o) => { for (let p = o; p; p = p.parent) if (p === scene) return true; return false; };
window.capsule = {
  scene, camera, renderer, THREE,
  data: { version: 1, scenes: {} }, editable: [], detectors: [], scenes: {},
  activeScene: 'main', activeState: 'base',
  _resolve(id) { const sc = this.data.scenes?.[this.activeScene]; if (!sc) return null;
    return { ...(sc.base?.[id] || {}), ...(sc.states?.[this.activeState]?.[id] || {}) }; },
  registerEditable(obj, id, type) {
    obj.userData.capsuleId = id; if (type) obj.userData.capsuleType = type; if (!obj.name) obj.name = id;
    if (obj.userData.capsuleScene === undefined) obj.userData.capsuleScene = this.activeScene;   // belongs to the active scene
    this.editable = this.editable.filter(e => e.id !== id);
    this.editable.push({ id, obj, type: obj.userData.capsuleType || 'object' });
    _apply(obj, this._resolve(id)); return obj;
  },
  tag(obj, opts = {}) { const o = typeof opts === 'string' ? { type: opts } : opts;
    const id = o.id || `${o.type||'obj'}@${Math.round(obj.position.x*10)/10},${Math.round(obj.position.z*10)/10}`;
    return this.registerEditable(obj, id, o.type); },
  addDetector(fn) { this.detectors.push(fn); return this; },
  scan() { this.scene.traverse(o => {
      if (this.editable.some(e => e.obj === o)) return;
      let id = o.userData?.capsuleId;
      if (!id) for (const d of this.detectors) { const r = d(o); if (r?.id) { id = r.id; o.userData.capsuleId = id; if (r.type) o.userData.capsuleType = r.type; break; } }
      if (!id) return;
      if (o.userData.capsuleScene === undefined) o.userData.capsuleScene = this.activeScene;
      if (o.userData.capsuleScene === this.activeScene) this.registerEditable(o, id, o.userData.capsuleType);
    });
    this.editable = this.editable.filter(e => _inScene(e.obj) && e.obj.userData.capsuleScene === this.activeScene); },
  defineScene(name, def) { this.scenes[name] = def; },
  setActiveScene(name) {
    if (this.activeScene === name) return;
    this.activeScene = name;
    // scenes are independent — show only the objects that belong to this one
    this.scene.traverse(o => { const s = o.userData && o.userData.capsuleScene; if (s !== undefined) o.visible = (s === name); });
    this.editable = [];
    this._behaviors.length = 0; this._bounds.length = 0;   // per-scene; re-added as the scene's assets do
    this._loadAdded();   // bring in this scene's own added objects
    this.scan();
  },
  setActiveState(state) { if (this.activeState === state) return; this.activeState = state;
    for (const { id, obj } of this.editable) _apply(obj, this._resolve(id)); },
  loadModel(src) { return new Promise((res, rej) => _loader.load(src, g => res(g.scene), undefined, rej)); },
  // Dropped GLBs: recorded under scenes[s].added and recreated on load (play + edit).
  _added: new Set(),
  async addObject(prop) {
    const obj = await this.loadModel(prop.src);
    obj.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
    obj.userData.capsuleAdded = true; _apply(obj, prop); this.scene.add(obj); this._added.add(prop.id);
    this.registerEditable(obj, prop.id, prop.type || 'model');
    const sc = this.data.scenes[this.activeScene] || (this.data.scenes[this.activeScene] = { base: {}, states: {}, added: [] });
    if (!sc.added) sc.added = [];
    if (!sc.added.find(a => a.id === prop.id)) sc.added.push(prop);
    return obj;
  },
  _prim(geo, color) {                                  // recreate an editor-added primitive
    const T = THREE, s = geo.shape, c = color ? new T.Color(color).getHex() : 0x9aa0aa;
    const g = s === 'sphere' ? new T.SphereGeometry(0.6, 24, 16)
      : s === 'cylinder' ? new T.CylinderGeometry(0.4, 0.4, 2.5, 20) : new T.BoxGeometry(1, 1, 1);
    const m = new T.Mesh(g, new T.MeshStandardMaterial({ color: c, roughness: 0.85, emissive: c, emissiveIntensity: 0.3 }));
    m.castShadow = true; m.receiveShadow = true; return m;
  },
  _loadAdded() {
    const sc = this.data.scenes?.[this.activeScene]; if (!sc?.added) return;
    for (const a of sc.added) {
      if (this._added.has(a.id)) continue; this._added.add(a.id);
      if (a.geo) { const m = this._prim(a.geo, a.color); m.userData.capsuleAdded = true; _apply(m, a);
        this.scene.add(m); this.registerEditable(m, a.id, a.type || 'prop'); continue; }
      this.loadModel(a.src).then(obj => { obj.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
        obj.userData.capsuleAdded = true; _apply(obj, a); this.scene.add(obj); this.registerEditable(obj, a.id, a.type || 'model');
      }).catch(e => console.warn('[capsule] added object failed:', a.id, e.message)); }
  },
  // Re-apply editor edits to untagged structural meshes (walls, floors): match by
  // signature (name + geometry + original position), then apply transform + material.
  _applyMeshEdits() {
    const sc = this.data.scenes?.[this.activeScene]; if (!sc?.meshEdits) return;
    const tl = this._tex || (this._tex = new THREE.TextureLoader());
    const meshes = []; this.scene.traverse(o => { if (o.isMesh || o.isGroup || o.type === 'Group' || o.type === 'Object3D') meshes.push(o); });
    for (const e of sc.meshEdits) {
      const m = meshes.find(x => !x.userData.__meDone && (x.name || '') === e.sig.name
        && ((x.geometry && x.geometry.type) || '') === e.sig.geo
        && Math.abs(x.position.x - e.sig.pos[0]) < 0.06 && Math.abs(x.position.y - e.sig.pos[1]) < 0.06 && Math.abs(x.position.z - e.sig.pos[2]) < 0.06);
      if (!m) continue; m.userData.__meDone = true;
      if (e.position) m.position.set(e.position[0], e.position[1], e.position[2]);
      if (e.rotation) m.rotation.set(e.rotation[0] * DEG, e.rotation[1] * DEG, e.rotation[2] * DEG);
      if (e.scale) m.scale.set(e.scale[0], e.scale[1], e.scale[2]);
      if (e.color && m.material && m.material.color) m.material.color.set(e.color);
      if ('map' in e && m.material) { if (!e.map) m.material.map = null; else { const t = tl.load(e.map); t.colorSpace = THREE.SRGBColorSpace; m.material.map = t; } m.material.needsUpdate = true; }
    }
  },

  // ── assets + attributes (capsule.add) ─────────────────────────────────────
  // The one clean way to add a game asset: place it, tag it (editable + grouped),
  // and wire its attributes so they MOVE WITH IT. Attributes are handled by
  // components — built-ins (light / sound / collide / behavior) are registered
  // below; add your own with capsule.component(name, fn). Each handler gets (obj, spec).
  components: {}, _behaviors: [], _bounds: [], _listener: null,
  component(name, fn) { this.components[name] = fn; return this; },
  add(obj, opts = {}) {
    this.scene.add(obj);
    const type = opts.type || 'prop';
    const r = (n) => Math.round(n * 100) / 100;
    const id = opts.id || `${type}@${r(obj.position.x)},${r(obj.position.y)},${r(obj.position.z)}`;
    obj.userData.capsuleAttrs = opts;
    this.registerEditable(obj, id, type);
    for (const k in opts) { if (k === 'type' || k === 'id') continue; const h = this.components[k]; if (h) h(obj, opts[k]); }
    return obj;
  },
  tick(dt) { for (const b of this._behaviors) b(dt); },     // call once per frame from your loop
  blocked(x, z) {                                            // built-in following-collision query
    for (const b of this._bounds) { const o = b.obj; if (!o.parent || o.visible === false) continue;
      const cx = o.position.x + b.offX, cz = o.position.z + b.offZ;
      if (Math.abs(x - cx) < b.w && Math.abs(z - cz) < b.d) return true; }
    return false;
  },
};

// ── built-in attribute components — extend with capsule.component(name, fn) ──
window.capsule
  .component('light', (obj, s = {}) => {                     // child light → follows the asset
    const l = new THREE.PointLight(s.color ?? 0xffffff, s.intensity ?? 1, s.distance ?? 0, s.decay ?? 2);
    if (s.position) l.position.set(s.position[0], s.position[1], s.position[2]);
    l.castShadow = !!s.castShadow; obj.add(l); obj.userData.capsuleLight = l;
  })
  .component('sound', (obj, s = {}) => {                     // spatial PositionalAudio child → follows
    const cap = window.capsule;
    if (!cap._listener) { cap._listener = new THREE.AudioListener(); cap.camera.add(cap._listener); }
    const a = new THREE.PositionalAudio(cap._listener);
    a.setRefDistance(s.radius ?? 5); a.setLoop(s.loop ?? true); a.setVolume(s.volume ?? 1);
    new THREE.AudioLoader().load(s.src, (buf) => { a.setBuffer(buf); if (s.autoplay ?? true) a.play(); }, undefined, () => {});
    obj.add(a); obj.userData.capsuleSound = a;
  })
  .component('collide', (obj, s = {}) => {                   // following AABB → query capsule.blocked(x,z)
    window.capsule._bounds.push({ obj, w: s.w ?? 0.5, d: s.d ?? 0.5, offX: s.offX ?? 0, offZ: s.offZ ?? 0 });
  })
  .component('behavior', (obj, fn) => {                      // per-frame fn(asset, dt) via capsule.tick(dt)
    window.capsule._behaviors.push((dt) => fn(obj, dt));
  });
fetch('./capsule.scenes.json', { cache: 'no-store' }).then(r => r.ok ? r.json() : null)
  .then(d => { if (d) window.capsule.data = d; window.capsule.scan(); window.capsule._loadAdded(); window.capsule._applyMeshEdits(); }).catch(() => {});
setInterval(() => window.capsule.scan(), 1500);
// ============================================================================

// === WORLD ===
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({ color: 0x2a2a33 })
);
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
scene.add(ground);

// A starter cube — editable. Tell the AI to replace it with your game.
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0x4fd6c2 })
);
cube.position.set(0, 0.5, 0); cube.castShadow = true;
// capsule.add = place + tag + wire attributes. Add attributes as you grow, e.g.:
//   capsule.add(cube, { type: 'prop', id: 'starter-cube',
//     collide: { w: 0.5, d: 0.5 },                 // → capsule.blocked(x,z)
//     light:   { color: 0x4fd6c2, intensity: 1 },  // → child light, follows it
//     sound:   { src: './assets/audio/hum.mp3' },  // → spatial audio, follows it
//     behavior: (o, dt) => { o.rotation.y += dt; }, // → per-frame, via capsule.tick(dt)
//   });
window.capsule.add(cube, { type: 'prop', id: 'starter-cube' });

// === RENDER LOOP ===
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => { const dt = clock.getDelta(); window.capsule.tick(dt); renderer.render(scene, camera); });

// === RESIZE ===
addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// === CAPSULE EDIT MODE (?edit) — attaches the editor overlay ===
if (new URLSearchParams(location.search).has('edit')) {
  import('./capsule-edit.js').then(m => m.initCapsuleEditor(window.capsule)).catch((e) => console.error(e));
}
</script>
</body>
</html>
